<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REG-MEDIS PRO FINAL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <!-- Firebase SDK (Compatibility Mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media print { 
            .no-print { display: none !important; }
            #print-area { display: block !important; position: absolute; left: 0; top: 0; width: 100%; }
        }
        #print-area { display: none; }
        input[type="date"], input[type="time"], select { appearance: none; -webkit-appearance: none; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAbchKwknPm3jMkDt7aP_mJXM0PV68uLVU",
            authDomain: "reg-medis.firebaseapp.com",
            projectId: "reg-medis",
            storageBucket: "reg-medis.firebasestorage.app",
            messagingSenderId: "544188622798",
            appId: "1:544188622798:web:8cc3e8f579af47c1f6ad9f",
            measurementId: "G-F2V21RE7XR"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const auth = firebase.auth();

        const ACCESS_KEY = "1234";
        const PEKERJAAN_OPTIONS = ['IRT', 'Petani', 'Wiraswasta', 'ASN', 'Supir', 'Mahasiswa/Pelajar', 'Buruh', 'Nelayan', 'Pensiunan', 'Lainnya'];

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) { window.lucide.createIcons(); }
            }, [name]);
            return <i data-lucide={name.toLowerCase()} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const App = () => {
            const [isUnlocked, setIsUnlocked] = useState(localStorage.getItem('app_unlocked') === 'true');
            const [loginPass, setLoginPass] = useState("");
            const [activeTab, setActiveTab] = useState('dashboard');
            const [patients, setPatients] = useState([]);
            const [loading, setLoading] = useState(false);
            const [importing, setImporting] = useState(false);
            const [message, setMessage] = useState(null);
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().substring(0, 7));
            const [filterStatus, setFilterStatus] = useState('Semua');
            const [selectedPatient, setSelectedPatient] = useState(null);
            const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

            const initialFormState = {
                tanggal: new Date().toISOString().substring(0, 10),
                jam: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }),
                namaPasien: '', namaKK: '', tglLahir: '', umur: '', jenisKelamin: 'L',
                alamat: '', pekerjaan: 'IRT', noHp: '', nik: '', noBpjs: '',
                status: 'Umum', anamnesa: '', diagnosis: '', icd10: '', tindakan: '', terapi: '', petugas: ''
            };
            const [formData, setFormData] = useState(initialFormState);

            useEffect(() => {
                if (!isUnlocked) return;
                auth.signInAnonymously().catch(e => console.log("Connected"));
                
                const unsubscribe = db.collection('patients')
                    .orderBy('tanggal', 'desc')
                    .onSnapshot((snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setPatients(data);
                    }, (err) => console.error(err));
                return () => unsubscribe();
            }, [isUnlocked]);

            const calculateAgeDetail = (birthDate) => {
                if (!birthDate) return '';
                const today = new Date();
                const birth = new Date(birthDate);
                let years = today.getFullYear() - birth.getFullYear();
                let months = today.getMonth() - birth.getMonth();
                if (today.getDate() < birth.getDate()) months--;
                if (months < 0) { years--; months += 12; }
                return years > 0 ? `${years} Thn` : `${months} Bln`;
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginPass === ACCESS_KEY) {
                    setIsUnlocked(true);
                    localStorage.setItem('app_unlocked', 'true');
                } else {
                    setMessage({ type: 'error', text: 'Kunci Akses Salah!' });
                    setTimeout(() => setMessage(null), 2000);
                }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if (formData.nik && formData.nik.length !== 16) {
                    setMessage({ type: 'error', text: 'NIK harus 16 digit!' });
                    return;
                }
                setLoading(true);
                try {
                    if (selectedPatient && activeTab === 'register') {
                        await db.collection('patients').doc(selectedPatient.id).update(formData);
                        setMessage({ type: 'success', text: 'Data diperbarui!' });
                    } else {
                        await db.collection('patients').add({ ...formData, createdAt: new Date().toISOString() });
                        setMessage({ type: 'success', text: 'Data disimpan!' });
                    }
                    setFormData(initialFormState);
                    setSelectedPatient(null);
                    setTimeout(() => { setActiveTab('history'); setMessage(null); }, 1500);
                } catch (err) { setMessage({ type: 'error', text: 'Gagal memproses data.' }); }
                finally { setLoading(false); }
            };

            const confirmDelete = async () => {
                try {
                    await db.collection('patients').doc(selectedPatient.id).delete();
                    setShowDeleteConfirm(false);
                    setSelectedPatient(null);
                    setMessage({ type: 'success', text: 'Data dihapus.' });
                    setTimeout(() => setMessage(null), 2000);
                } catch (err) { console.error(err); }
            };

            const filteredPatients = useMemo(() => {
                return patients.filter(p => (p.tanggal || "").startsWith(filterMonth) && (filterStatus === 'Semua' || p.status === filterStatus));
            }, [patients, filterMonth, filterStatus]);

            const dashboardData = useMemo(() => {
                const current = patients.filter(p => (p.tanggal || "").startsWith(filterMonth));
                const statusCounts = current.reduce((acc, p) => { acc[p.status] = (acc[p.status] || 0) + 1; return acc; }, {});
                const icdCounts = current.reduce((acc, p) => { const code = p.icd10 || "TANPA ICD"; acc[code] = (acc[code] || 0) + 1; return acc; }, {});
                const topIcd = Object.entries(icdCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);
                return { total: current.length, statusCounts, topIcd };
            }, [patients, filterMonth]);

            const downloadCSV = () => {
                const headers = "Tanggal,Jam,Nama Pasien,Nama KK,Tgl Lahir,Umur,JK,Status,NIK,No BPJS,No HP,Alamat,Pekerjaan,Keluhan,Diagnosa,ICD-10,Tindakan,Terapi,Petugas\n";
                const rows = filteredPatients.map(p => 
                    `"${p.tanggal}","${p.jam}","${p.namaPasien}","${p.namaKK}","${p.tglLahir}","${p.umur}","${p.jenisKelamin}","${p.status}","=""${p.nik}""","=""${p.noBpjs}""","=""${p.noHp}""","${p.alamat}","${p.pekerjaan}","${p.anamnesa}","${p.diagnosis}","${p.icd10}","${p.tindakan}","${p.terapi}","${p.petugas}"`
                ).join("\n");
                const blob = new Blob(["\ufeff" + headers + rows], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `Reg_Medis_${filterMonth}.csv`;
                link.click();
            };

            const downloadTemplate = () => {
                const headers = ["Tanggal", "Jam", "Nama Pasien", "Nama KK", "Tgl Lahir", "JK", "Status", "NIK", "No BPJS", "No HP", "Alamat", "Pekerjaan", "Keluhan", "Diagnosa", "ICD-10", "Tindakan", "Terapi", "Petugas"];
                const ws = XLSX.utils.aoa_to_sheet([headers]);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Template");
                XLSX.writeFile(wb, "Template_Reg_Medis.xlsx");
            };

            const handleImportExcel = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setImporting(true);
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const bstr = evt.target.result;
                        const wb = XLSX.read(bstr, { type: 'binary' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const data = XLSX.utils.sheet_to_json(ws);
                        let count = 0;
                        for (const row of data) {
                            const tglLahir = row['Tgl Lahir'] ? new Date((row['Tgl Lahir'] - (25567 + 1)) * 86400 * 1000).toISOString().split('T')[0] : '';
                            await db.collection('patients').add({
                                tanggal: row['Tanggal'] || new Date().toISOString().split('T')[0],
                                jam: row['Jam'] || "08:00",
                                namaPasien: (row['Nama Pasien'] || "").toString().toUpperCase(),
                                namaKK: (row['Nama KK'] || "").toString().toUpperCase(),
                                tglLahir: tglLahir,
                                umur: calculateAgeDetail(tglLahir),
                                jenisKelamin: row['JK'] || 'L',
                                status: row['Status'] || 'Umum',
                                nik: (row['NIK'] || "").toString(),
                                noBpjs: (row['No BPJS'] || "").toString(),
                                noHp: (row['No HP'] || "").toString(),
                                alamat: row['Alamat'] || '',
                                pekerjaan: row['Pekerjaan'] || 'Lainnya',
                                anamnesa: row['Keluhan'] || '',
                                diagnosis: row['Diagnosa'] || '',
                                icd10: (row['ICD-10'] || "").toString().toUpperCase(),
                                tindakan: row['Tindakan'] || '',
                                terapi: row['Terapi'] || '',
                                petugas: row['Petugas'] || 'Import',
                                createdAt: new Date().toISOString()
                            });
                            count++;
                        }
                        setMessage({ type: 'success', text: `${count} data berhasil diimpor!` });
                    } catch (err) { setMessage({ type: 'error', text: 'Gagal impor data.' }); }
                    finally { setImporting(false); setTimeout(() => setMessage(null), 3000); }
                };
                reader.readAsBinaryString(file);
            };

            if (!isUnlocked) {
                return (
                    <div className="min-h-screen bg-blue-700 flex items-center justify-center p-6">
                        <div className="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl text-center animate-in">
                            <div className="w-20 h-20 bg-blue-50 text-blue-600 rounded-[2rem] flex items-center justify-center mx-auto mb-6"><Icon name="lock" size={40} /></div>
                            <h1 className="text-2xl font-bold mb-8">REG-MEDIS LOGIN</h1>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="password" required className="w-full p-4 bg-slate-50 border-2 rounded-3xl text-center text-xl font-bold outline-none" placeholder="KUNCI" value={loginPass} onChange={(e) => setLoginPass(e.target.value)} />
                                <button type="submit" className="w-full py-4 bg-blue-600 text-white font-bold rounded-3xl active:scale-95 transition-all">MASUK</button>
                            </form>
                            {message && <p className="mt-4 text-red-500 font-bold text-sm">{message.text}</p>}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-28">
                    <header className="bg-blue-700 text-white p-5 sticky top-0 z-30 shadow-lg flex justify-between items-center rounded-b-[2.5rem] no-print">
                        <div className="flex flex-col">
                            <h1 className="text-xl font-black italic tracking-tighter">REG-MEDIS PRO</h1>
                            <p className="text-[9px] opacity-70 font-bold uppercase tracking-widest">{activeTab}</p>
                        </div>
                        <button onClick={() => { localStorage.removeItem('app_unlocked'); window.location.reload(); }} className="bg-white/10 p-2 rounded-xl active:scale-90"><Icon name="power" size={18} /></button>
                    </header>

                    <main className="max-w-xl mx-auto p-4 no-print">
                        {message && (
                            <div className={`mb-4 p-4 rounded-2xl text-xs font-bold flex items-center gap-2 shadow-md animate-in ${message.type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`}>
                                <Icon name="info" size={16} /> {message.text}
                            </div>
                        )}

                        {/* DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-4 animate-in">
                                <div className="bg-white p-5 rounded-[2.5rem] border shadow-sm space-y-4">
                                    <div className="flex items-center justify-between">
                                        <input type="month" className="text-sm font-bold outline-none bg-slate-50 px-4 py-2 rounded-xl" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} />
                                        <div className="flex gap-2">
                                            <button onClick={() => window.print()} className="p-3 bg-slate-800 text-white rounded-2xl active:scale-90" title="Cetak Laporan"><Icon name="printer" size={20} /></button>
                                            <button onClick={downloadCSV} className="p-3 bg-blue-600 text-white rounded-2xl active:scale-90" title="Download CSV"><Icon name="download" size={20} /></button>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <label className="flex-1 flex items-center justify-center gap-2 py-3 bg-blue-100 text-blue-700 rounded-2xl font-bold text-xs cursor-pointer active:scale-95 transition-all">
                                            <Icon name="file-up" size={18} /> {importing ? 'IMPORTING...' : 'IMPORT EXCEL'}
                                            <input type="file" className="hidden" accept=".xlsx, .xls" onChange={handleImportExcel} disabled={importing} />
                                        </label>
                                        <button onClick={downloadTemplate} className="flex-1 flex items-center justify-center gap-2 py-3 bg-emerald-100 text-emerald-700 rounded-2xl font-bold text-xs active:scale-95 transition-all">
                                            <Icon name="file-text" size={18} /> UNDUH TEMPLATE
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="bg-blue-600 p-8 rounded-[3rem] text-white shadow-xl shadow-blue-100 relative overflow-hidden">
                                    <Icon name="users" size={100} className="absolute -right-4 -bottom-4 opacity-10" />
                                    <p className="text-xs font-bold opacity-70 uppercase tracking-widest mb-1">Pasien Terdaftar</p>
                                    <p className="text-6xl font-black">{dashboardData.total}</p>
                                    <div className="mt-6 flex gap-3 text-[10px] font-bold uppercase">
                                        <span className="bg-white/20 px-3 py-1.5 rounded-xl">UMUM: {dashboardData.statusCounts['Umum'] || 0}</span>
                                        <span className="bg-white/20 px-3 py-1.5 rounded-xl">BPJS: {dashboardData.statusCounts['BPJS'] || 0}</span>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-[3rem] border shadow-sm">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><Icon name="bar-chart-3" size={16} /> Top 10 ICD-10 Bulan Ini</h3>
                                    <div className="space-y-2">
                                        {dashboardData.topIcd.map(([code, count]) => (
                                            <div key={code} className="flex items-center gap-3">
                                                <span className="text-[11px] font-mono font-bold text-blue-600 w-12">{code}</span>
                                                <div className="flex-1 bg-slate-50 h-2 rounded-full overflow-hidden">
                                                    <div className="bg-blue-500 h-full rounded-full transition-all duration-1000" style={{width: `${(count/dashboardData.total)*100}%`}}></div>
                                                </div>
                                                <span className="text-[11px] font-bold text-slate-400">{count}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* INPUT FORM - ALL FIELDS DISPLAYED */}
                        {activeTab === 'register' && (
                            <div className="bg-white rounded-[2.5rem] shadow-sm border p-6 animate-in">
                                <h2 className="text-lg font-black mb-6 border-b pb-4 flex items-center gap-2 uppercase">
                                    <Icon name="user-plus" size={20} className="text-blue-600" /> {selectedPatient ? 'Edit Data' : 'Daftar Baru'}
                                </h2>
                                <form onSubmit={handleSave} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-bold text-slate-400 ml-2">TANGGAL</label>
                                            <input type="date" required className="w-full p-4 bg-slate-50 border-0 rounded-2xl text-sm font-bold" value={formData.tanggal} onChange={e => setFormData({...formData, tanggal: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-bold text-slate-400 ml-2">JAM</label>
                                            <input type="time" required className="w-full p-4 bg-slate-50 border-0 rounded-2xl text-sm font-bold" value={formData.jam} onChange={e => setFormData({...formData, jam: e.target.value})} />
                                        </div>
                                    </div>
                                    
                                    <input type="text" required placeholder="NAMA LENGKAP PASIEN (KAPITAL)" className="w-full p-4 bg-slate-50 border-0 rounded-2xl font-bold uppercase text-sm" value={formData.namaPasien} onChange={e => setFormData({...formData, namaPasien: e.target.value.toUpperCase()})} />
                                    <input type="text" required placeholder="NAMA KEPALA KELUARGA (KK)" className="w-full p-4 bg-slate-50 border-0 rounded-2xl font-bold uppercase text-sm" value={formData.namaKK} onChange={e => setFormData({...formData, namaKK: e.target.value.toUpperCase()})} />

                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-bold text-slate-400 ml-2">TGL LAHIR</label>
                                            <input type="date" required className="w-full p-4 bg-slate-50 border-0 rounded-2xl text-sm font-bold" value={formData.tglLahir} onChange={e => { const d = e.target.value; setFormData({...formData, tglLahir: d, umur: calculateAgeDetail(d)}); }} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-bold text-slate-400 ml-2">UMUR (OTOMATIS)</label>
                                            <input type="text" readOnly className="w-full p-4 bg-blue-50 border-0 rounded-2xl font-black text-blue-700 text-center text-sm" value={formData.umur || '-'} />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-3 gap-2">
                                        <select className="p-4 bg-slate-50 border-0 rounded-2xl text-[10px] font-bold" value={formData.jenisKelamin} onChange={e => setFormData({...formData, jenisKelamin: e.target.value})}>
                                            <option value="L">LAKI-LAKI</option>
                                            <option value="P">PEREMPUAN</option>
                                        </select>
                                        <select className="p-4 bg-slate-50 border-0 rounded-2xl text-[10px] font-bold" value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})}>
                                            <option value="Umum">UMUM</option>
                                            <option value="BPJS">BPJS</option>
                                            <option value="Lainnya">LAINNYA</option>
                                        </select>
                                        <select className="p-4 bg-slate-50 border-0 rounded-2xl text-[10px] font-bold" value={formData.pekerjaan} onChange={e => setFormData({...formData, pekerjaan: e.target.value})}>
                                            {PEKERJAAN_OPTIONS.map(opt => <option key={opt} value={opt}>{opt.toUpperCase()}</option>)}
                                        </select>
                                    </div>

                                    <div className="space-y-3">
                                        <input type="number" placeholder="NIK (16 DIGIT)" className={`w-full p-4 border-0 rounded-2xl text-sm ${formData.nik && formData.nik.length !== 16 ? 'bg-red-50 text-red-600' : 'bg-slate-50 font-bold'}`} value={formData.nik} onChange={e => setFormData({...formData, nik: e.target.value})} />
                                        <input type="number" placeholder="NO. KARTU BPJS" className="w-full p-4 bg-slate-50 border-0 rounded-2xl text-sm font-bold" value={formData.noBpjs} onChange={e => setFormData({...formData, noBpjs: e.target.value})} />
                                        <input type="number" placeholder="NO. HP" className="w-full p-4 bg-slate-50 border-0 rounded-2xl text-sm font-bold" value={formData.noHp} onChange={e => setFormData({...formData, noHp: e.target.value})} />
                                    </div>

                                    <textarea placeholder="ALAMAT LENGKAP" className="w-full p-4 bg-slate-50 border-0 rounded-2xl text-sm font-bold min-h-[60px]" value={formData.alamat} onChange={e => setFormData({...formData, alamat: e.target.value})} />

                                    <div className="bg-blue-50 p-6 rounded-[2.5rem] space-y-4 border-2 border-blue-100">
                                        <textarea placeholder="KELUHAN / ANAMNESA" className="w-full p-4 bg-white border-0 rounded-2xl text-sm italic min-h-[100px]" value={formData.anamnesa} onChange={e => setFormData({...formData, anamnesa: e.target.value})} />
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="text" placeholder="DIAGNOSA" className="p-4 bg-white border-0 rounded-2xl text-sm font-bold" value={formData.diagnosis} onChange={e => setFormData({...formData, diagnosis: e.target.value})} />
                                            <input type="text" placeholder="KODE ICD-10" className="p-4 bg-white border-0 rounded-2xl text-sm font-black text-blue-600" value={formData.icd10} onChange={e => setFormData({...formData, icd10: e.target.value.toUpperCase()})} />
                                        </div>
                                        <textarea placeholder="TINDAKAN" className="w-full p-4 bg-white border-0 rounded-2xl text-sm" value={formData.tindakan} onChange={e => setFormData({...formData, tindakan: e.target.value})} />
                                        <textarea placeholder="TERAPI / OBAT" className="w-full p-4 bg-white border-0 rounded-2xl text-sm font-bold" value={formData.terapi} onChange={e => setFormData({...formData, terapi: e.target.value})} />
                                        <input type="text" placeholder="NAMA PETUGAS" className="w-full p-4 bg-white border-0 rounded-2xl text-sm font-bold" value={formData.petugas} onChange={e => setFormData({...formData, petugas: e.target.value})} />
                                    </div>
                                    <button type="submit" disabled={loading} className="w-full py-5 bg-blue-600 text-white font-black rounded-3xl shadow-xl uppercase tracking-widest">
                                        {loading ? 'MEMPROSES...' : 'SIMPAN KE CLOUD'}
                                    </button>
                                </form>
                            </div>
                        )}

                        {/* REGISTER LIST */}
                        {activeTab === 'history' && (
                            <div className="space-y-4 animate-in">
                                <div className="bg-white p-4 rounded-[2rem] border shadow-sm flex gap-2">
                                    <input type="month" className="flex-1 p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} />
                                    <select className="flex-1 p-3 bg-slate-50 rounded-xl text-xs font-bold outline-none" value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
                                        <option value="Semua">SEMUA</option>
                                        <option value="Umum">UMUM</option>
                                        <option value="BPJS">BPJS</option>
                                    </select>
                                </div>
                                <div className="bg-white rounded-[2.5rem] border shadow-sm overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[9px] font-black text-slate-400 uppercase tracking-widest">
                                            <tr><th className="p-4">TGL</th><th className="p-4">PASIEN</th><th className="p-4">ICD</th></tr>
                                        </thead>
                                        <tbody className="divide-y text-sm">
                                            {filteredPatients.map(p => (
                                                <tr key={p.id} className="active:bg-blue-50 cursor-pointer transition-colors" onClick={() => setSelectedPatient(p)}>
                                                    <td className="p-4 text-[9px] font-bold text-slate-400">{p.tanggal?.split('-').reverse().slice(0,2).join('/')}</td>
                                                    <td className="p-4">
                                                        <p className="font-black text-slate-800 text-[11px] uppercase truncate max-w-[120px]">{p.namaPasien}</p>
                                                        <span className={`text-[7px] font-black px-1.5 py-0.5 rounded uppercase ${p.status === 'BPJS' ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-600'}`}>{p.status}</span>
                                                    </td>
                                                    <td className="p-4 font-mono text-[10px] text-blue-600 font-black">{p.icd10 || '-'}</td>
                                                </tr>
                                            ))}
                                            {filteredPatients.length === 0 && <tr><td colSpan="3" className="p-16 text-center text-xs text-slate-300 italic">Data tidak ditemukan</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* DETAIL MODAL */}
                    {selectedPatient && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-md" onClick={() => setSelectedPatient(null)} />
                            <div className="bg-white w-full max-w-sm rounded-[3.5rem] shadow-2xl relative overflow-hidden animate-in">
                                <div className="p-8 space-y-6 max-h-[80vh] overflow-y-auto">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <p className="font-black text-2xl uppercase leading-tight">{selectedPatient.namaPasien}</p>
                                            <p className="text-[10px] font-bold text-slate-400 uppercase">{selectedPatient.umur} • {selectedPatient.status}</p>
                                        </div>
                                        <button onClick={() => setSelectedPatient(null)} className="p-2 bg-slate-100 rounded-full"><Icon name="x" size={24} /></button>
                                    </div>
                                    <div className="bg-blue-50 p-6 rounded-[2.5rem] border border-blue-100">
                                        <p className="text-[10px] font-black text-blue-600 uppercase mb-1">Diagnosa & ICD</p>
                                        <p className="font-black text-xl text-blue-900 leading-tight uppercase">{selectedPatient.diagnosis} ({selectedPatient.icd10 || '-'})</p>
                                    </div>
                                    <div className="bg-orange-50 p-4 rounded-2xl border-l-4 border-orange-400">
                                        <p className="text-[9px] font-black text-orange-600 uppercase mb-1">Keluhan:</p>
                                        <p className="text-sm italic text-slate-700 leading-relaxed">"{selectedPatient.anamnesa || '-'}"</p>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2 pt-4">
                                        <button onClick={() => setShowDeleteConfirm(true)} className="flex-1 py-4 bg-red-50 text-red-600 rounded-2xl font-black text-xs uppercase">Hapus</button>
                                        <button onClick={() => { setActiveTab('register'); setFormData(selectedPatient); setSelectedPatient(null); }} className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase shadow-lg">Edit</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* DELETE MODAL */}
                    {showDeleteConfirm && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-6 bg-red-900/60 backdrop-blur-md">
                            <div className="bg-white w-full max-w-xs rounded-[3rem] p-10 text-center shadow-2xl animate-in">
                                <Icon name="alert-triangle" size={60} className="text-red-600 mx-auto mb-4" />
                                <h3 className="text-xl font-black mb-2 uppercase">Hapus Data?</h3>
                                <p className="text-[10px] text-slate-500 mb-8 font-bold uppercase tracking-widest leading-relaxed">Data akan terhapus selamanya.</p>
                                <button onClick={confirmDelete} className="w-full py-4 bg-red-600 text-white font-black rounded-2xl text-xs uppercase mb-2 shadow-lg">YA, HAPUS</button>
                                <button onClick={() => setShowDeleteConfirm(false)} className="w-full py-2 text-slate-400 font-bold text-xs uppercase">BATAL</button>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t p-4 flex justify-around items-center z-40 no-print rounded-t-[2.5rem] shadow-2xl">
                        {[
                            { id: 'dashboard', icon: 'layout-dashboard', label: 'Home' },
                            { id: 'register', icon: 'user-plus', label: 'Input' },
                            { id: 'history', icon: 'clipboard-list', label: 'Register' }
                        ].map(t => (
                            <button key={t.id} onClick={() => { setActiveTab(t.id); setSelectedPatient(null); }} className={`flex flex-col items-center gap-1 transition-colors ${activeTab === t.id ? 'text-blue-600' : 'text-slate-400'}`}>
                                <div className={`p-3 rounded-2xl transition-all ${activeTab === t.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : ''}`}><Icon name={t.icon} size={24} /></div>
                                <span className="text-[8px] font-black uppercase tracking-widest">{t.label}</span>
                            </button>
                        ))}
                    </nav>

                    {/* PRINT AREA */}
                    <div id="print-area" className="p-10 font-serif text-black">
                        <div className="text-center border-b-4 border-double pb-4 mb-8">
                            <h1 className="text-2xl font-bold uppercase">Laporan Rekapitulasi Pasien</h1>
                            <h2 className="text-lg uppercase">Periode: {filterMonth}</h2>
                        </div>
                        <div className="grid grid-cols-2 gap-8 mb-10">
                            <div className="border p-4 rounded-xl">
                                <h3 className="font-bold border-b mb-2 uppercase text-center">Statistik</h3>
                                <p>Total Pasien: {dashboardData.total}</p>
                                <p>Umum: {dashboardData.statusCounts['Umum'] || 0}</p>
                                <p>BPJS: {dashboardData.statusCounts['BPJS'] || 0}</p>
                            </div>
                            <div className="border p-4 rounded-xl text-sm">
                                <h3 className="font-bold border-b mb-2 uppercase text-center">ICD-10</h3>
                                {dashboardData.topIcd.map(([code, count]) => <p key={code}>{code}: {count} Kasus</p>)}
                            </div>
                        </div>
                        <div className="mt-20 flex justify-end">
                            <div className="text-center w-64 border-t border-black pt-2 font-bold uppercase">Petugas Pemeriksa</div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
