<!-- Firebase (Ubah versi jika perlu) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    @media print { 
        .no-print { display: none !important; }
        #print-area { display: block !important; }
    }
    #print-area { display: none; }
</style>


<script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    
    // --- KONFIGURASI FIREBASE ---
    // Ganti dengan config milik Anda dari Firebase Console
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "project-id.firebaseapp.com",
        projectId: "project-id",
        storageBucket: "project-id.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:abcdef"
    };

    // Inisialisasi Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const auth = firebase.auth();
    const appId = 'patient-reg-001';

    const ACCESS_KEY = "1234";
    const PEKERJAAN_OPTIONS = ['IRT', 'Petani', 'Wiraswasta', 'ASN', 'Supir', 'Mahasiswa/Pelajar', 'Buruh', 'Nelayan', 'Pensiunan', 'Lainnya'];

    // --- KOMPONEN ICON (LUCIDE) ---
    const Icon = ({ name, className }) => {
        const [iconHtml, setIconHtml] = useState('');
        useEffect(() => {
            if (window.lucide) {
                const icon = window.lucide.icons[name];
                if (icon) setIconHtml(icon.toSvg({ class: className }));
            }
        }, [name, className]);
        return <span dangerouslySetInnerHTML={{ __html: iconHtml }} />;
    };

    const App = () => {
        const [isUnlocked, setIsUnlocked] = useState(localStorage.getItem('app_unlocked') === 'true');
        const [loginPass, setLoginPass] = useState("");
        const [activeTab, setActiveTab] = useState('dashboard');
        const [patients, setPatients] = useState([]);
        const [loading, setLoading] = useState(false);
        const [message, setMessage] = useState(null);
        const [filterMonth, setFilterMonth] = useState(new Date().toISOString().substring(0, 7));
        const [filterStatus, setFilterStatus] = useState('Semua');
        const [selectedPatient, setSelectedPatient] = useState(null);
        const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);

        const initialFormState = {
            tanggal: new Date().toISOString().substring(0, 10),
            jam: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }),
            namaPasien: '', namaKK: '', tglLahir: '', umur: '', jenisKelamin: 'L',
            alamat: '', pekerjaan: 'IRT', noHp: '', nik: '', noBpjs: '',
            status: 'Umum', anamnesa: '', diagnosis: '', icd10: '', tindakan: '', terapi: '', petugas: ''
        };
        const [formData, setFormData] = useState(initialFormState);

        useEffect(() => {
            auth.signInAnonymously().catch(e => console.error(e));
            const unsubscribe = db.collection('patients')
                .onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setPatients(data.sort((a, b) => new Date(b.tanggal + " " + b.jam) - new Date(a.tanggal + " " + a.jam)));
                });
            return () => unsubscribe();
        }, []);

        const calculateAgeDetail = (birthDate) => {
            if (!birthDate) return '';
            const today = new Date();
            const birth = new Date(birthDate);
            let years = today.getFullYear() - birth.getFullYear();
            let months = today.getMonth() - birth.getMonth();
            if (today.getDate() < birth.getDate()) months--;
            if (months < 0) { years--; months += 12; }
            return years > 0 ? `${years} Thn` : `${months} Bln`;
        };

        const handleLogin = (e) => {
            e.preventDefault();
            if (loginPass === ACCESS_KEY) {
                setIsUnlocked(true);
                localStorage.setItem('app_unlocked', 'true');
            } else {
                alert("Kunci Salah!");
            }
        };

        const handleSave = async (e) => {
            e.preventDefault();
            setLoading(true);
            try {
                if (selectedPatient && activeTab === 'register') {
                    await db.collection('patients').doc(selectedPatient.id).update(formData);
                } else {
                    await db.collection('patients').add({ ...formData, createdAt: new Date().toISOString() });
                }
                setMessage({ type: 'success', text: 'Berhasil disimpan!' });
                setFormData(initialFormState);
                setTimeout(() => { setActiveTab('history'); setMessage(null); }, 1000);
            } catch (err) { alert("Gagal!"); }
            setLoading(false);
        };

        const confirmDelete = async () => {
            await db.collection('patients').doc(selectedPatient.id).delete();
            setShowDeleteConfirm(false);
            setSelectedPatient(null);
        };

        const filteredPatients = useMemo(() => {
            return patients.filter(p => (p.tanggal || "").startsWith(filterMonth) && (filterStatus === 'Semua' || p.status === filterStatus));
        }, [patients, filterMonth, filterStatus]);

        const dashboardData = useMemo(() => {
            const current = patients.filter(p => (p.tanggal || "").startsWith(filterMonth));
            const statusCounts = current.reduce((acc, p) => { acc[p.status] = (acc[p.status] || 0) + 1; return acc; }, {});
            const icdCounts = current.reduce((acc, p) => { const code = p.icd10 || "LAIN"; acc[code] = (acc[code] || 0) + 1; return acc; }, {});
            const topIcd = Object.entries(icdCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);
            return { total: current.length, statusCounts, topIcd };
        }, [patients, filterMonth]);

        const downloadCSV = () => {
            const headers = "Tanggal,Jam,Nama,KK,Umur,JK,Status,NIK,BPJS,HP,Alamat,Keluhan,Diagnosa,ICD10,Tindakan,Terapi\n";
            const rows = filteredPatients.map(p => 
                `"${p.tanggal}","${p.jam}","${p.namaPasien}","${p.namaKK}","${p.umur}","${p.jenisKelamin}","${p.status}","${p.nik}","${p.noBpjs}","${p.noHp}","${p.alamat}","${p.anamnesa}","${p.diagnosis}","${p.icd10}","${p.tindakan}","${p.terapi}"`
            ).join("\n");
            const blob = new Blob(["\ufeff" + headers + rows], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Register_${filterMonth}.csv`;
            link.click();
        };

        if (!isUnlocked) {
            return (
                <div className="min-h-screen bg-blue-700 flex items-center justify-center p-6">
                    <div className="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl text-center">
                        <h1 className="text-2xl font-bold mb-8 text-blue-700">REG-MEDIS LOGIN</h1>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="password" required className="w-full p-4 bg-slate-50 border-2 rounded-3xl text-center text-xl font-bold outline-none" placeholder="KUNCI" value={loginPass} onChange={(e) => setLoginPass(e.target.value)} />
                            <button type="submit" className="w-full py-4 bg-blue-600 text-white font-bold rounded-3xl">MASUK</button>
                        </form>
                    </div>
                </div>
            );
        }

        return (
            <div className="min-h-screen pb-24">
                <header className="bg-blue-700 text-white p-6 sticky top-0 z-30 shadow-lg rounded-b-[2.5rem] no-print flex justify-between items-center">
                    <div>
                        <h1 className="text-xl font-black italic">REG-MEDIS PRO</h1>
                        <p className="text-[9px] opacity-70 font-bold uppercase">{activeTab}</p>
                    </div>
                    <button onClick={() => { localStorage.removeItem('app_unlocked'); window.location.reload(); }} className="bg-white/10 p-2 rounded-xl">
                        <Icon name="Lock" className="w-4 h-4" />
                    </button>
                </header>

                <main className="max-w-xl mx-auto p-4 no-print">
                    {activeTab === 'dashboard' && (
                        <div className="space-y-4">
                            <div className="bg-white p-5 rounded-[2rem] border shadow-sm flex items-center justify-between">
                                <input type="month" className="text-sm font-bold outline-none" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} />
                                <div className="flex gap-2">
                                    <button onClick={() => window.print()} className="p-3 bg-slate-800 text-white rounded-xl"><Icon name="Printer" className="w-4 h-4" /></button>
                                    <button onClick={downloadCSV} className="p-3 bg-blue-600 text-white rounded-xl"><Icon name="Download" className="w-4 h-4" /></button>
                                </div>
                            </div>
                            <div className="bg-blue-600 p-8 rounded-[2.5rem] text-white shadow-xl">
                                <p className="text-xs font-bold opacity-70 mb-1 uppercase tracking-widest">Total Pasien Bulan Ini</p>
                                <p className="text-6xl font-black">{dashboardData.total}</p>
                                <div className="mt-4 flex gap-2 text-[9px] font-bold">
                                    <span className="bg-white/20 px-3 py-1 rounded-full">UMUM: {dashboardData.statusCounts['Umum'] || 0}</span>
                                    <span className="bg-white/20 px-3 py-1 rounded-full">BPJS: {dashboardData.statusCounts['BPJS'] || 0}</span>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-[2.5rem] border shadow-sm">
                                <h3 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Top Diagnosa ICD-10</h3>
                                <div className="space-y-2">
                                    {dashboardData.topIcd.map(([code, count]) => (
                                        <div key={code} className="flex items-center gap-3">
                                            <span className="text-[10px] font-black text-blue-600 w-10">{code}</span>
                                            <div className="flex-1 bg-slate-50 h-1.5 rounded-full"><div className="bg-blue-500 h-full rounded-full" style={{width: `${(count/dashboardData.total)*100}%`}}></div></div>
                                            <span className="text-[10px] font-bold text-slate-400">{count}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'register' && (
                        <div className="bg-white rounded-[2.5rem] shadow-sm border p-6">
                            <h2 className="text-lg font-black mb-6 border-b pb-4 uppercase">{selectedPatient ? 'Edit Data' : 'Daftar Baru'}</h2>
                            <form onSubmit={handleSave} className="space-y-4">
                                <div className="grid grid-cols-2 gap-3">
                                    <input type="date" required className="p-4 bg-slate-50 border-0 rounded-2xl text-sm font-bold" value={formData.tanggal} onChange={e => setFormData({...formData, tanggal: e.target.value})} />
                                    <input type="time" required className="p-4 bg-slate-50 border-0 rounded-2xl text-sm font-bold" value={formData.jam} onChange={e => setFormData({...formData, jam: e.target.value})} />
                                </div>
                                <input type="text" required placeholder="NAMA PASIEN" className="w-full p-4 bg-slate-50 border-0 rounded-2xl font-bold uppercase text-sm" value={formData.namaPasien} onChange={e => setFormData({...formData, namaPasien: e.target.value.toUpperCase()})} />
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-bold text-slate-400 ml-2 uppercase">Tgl Lahir</label>
                                        <input type="date" required className="w-full p-4 bg-slate-50 border-0 rounded-2xl text-sm font-bold" value={formData.tglLahir} onChange={e => { const d = e.target.value; setFormData({...formData, tglLahir: d, umur: calculateAgeDetail(d)}); }} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-bold text-slate-400 ml-2 uppercase">Umur</label>
                                        <input type="text" readOnly className="w-full p-4 bg-blue-50 border-0 rounded-2xl font-black text-blue-700 text-center text-sm" value={formData.umur || '-'} />
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <select className="p-4 bg-slate-50 border-0 rounded-2xl text-sm font-bold" value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})}>
                                        <option value="Umum">UMUM</option>
                                        <option value="BPJS">BPJS</option>
                                        <option value="Lainnya">LAINNYA</option>
                                    </select>
                                    <select className="p-4 bg-slate-50 border-0 rounded-2xl text-sm font-bold" value={formData.jenisKelamin} onChange={e => setFormData({...formData, jenisKelamin: e.target.value})}>
                                        <option value="L">LAKI-LAKI</option>
                                        <option value="P">PEREMPUAN</option>
                                    </select>
                                </div>
                                <input type="number" placeholder="NIK (16 DIGIT)" className="w-full p-4 bg-slate-50 border-0 rounded-2xl text-sm font-bold" value={formData.nik} onChange={e => setFormData({...formData, nik: e.target.value})} />
                                <textarea placeholder="KELUHAN / ANAMNESA" className="w-full p-4 bg-slate-50 border-0 rounded-2xl text-sm italic" value={formData.anamnesa} onChange={e => setFormData({...formData, anamnesa: e.target.value})} />
                                <div className="grid grid-cols-2 gap-3">
                                    <input type="text" placeholder="DIAGNOSA" className="p-4 bg-slate-50 border-0 rounded-2xl text-sm font-bold" value={formData.diagnosis} onChange={e => setFormData({...formData, diagnosis: e.target.value})} />
                                    <input type="text" placeholder="KODE ICD-10" className="p-4 bg-slate-50 border-0 rounded-2xl text-sm font-black text-blue-600" value={formData.icd10} onChange={e => setFormData({...formData, icd10: e.target.value.toUpperCase()})} />
                                </div>
                                <button type="submit" disabled={loading} className="w-full py-5 bg-blue-600 text-white font-black rounded-3xl shadow-xl uppercase tracking-widest">
                                    {loading ? 'MEMPROSES...' : 'SIMPAN DATA'}
                                </button>
                            </form>
                        </div>
                    )}

                    {activeTab === 'history' && (
                        <div className="space-y-4">
                            <div className="bg-white p-5 rounded-3xl border shadow-sm flex gap-2">
                                <input type="month" className="flex-1 p-3 bg-slate-50 rounded-xl text-xs font-bold" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} />
                                <select className="flex-1 p-3 bg-slate-50 rounded-xl text-xs font-bold" value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
                                    <option value="Semua">SEMUA STATUS</option>
                                    <option value="Umum">UMUM</option>
                                    <option value="BPJS">BPJS</option>
                                </select>
                            </div>
                            <div className="bg-white rounded-[2rem] border overflow-hidden">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 text-[9px] font-black text-slate-400 uppercase">
                                        <tr><th className="p-4">TGL</th><th className="p-4">PASIEN</th><th className="p-4">ICD</th></tr>
                                    </thead>
                                    <tbody className="divide-y text-sm">
                                        {filteredPatients.map(p => (
                                            <tr key={p.id} className="active:bg-blue-50 cursor-pointer" onClick={() => setSelectedPatient(p)}>
                                                <td className="p-4 text-[9px] font-bold text-slate-400">{p.tanggal?.split('-').reverse().slice(0,2).join('/')}</td>
                                                <td className="p-4">
                                                    <p className="font-black text-slate-800 text-[11px] uppercase truncate max-w-[120px]">{p.namaPasien}</p>
                                                    <span className="text-[7px] font-black px-1 rounded bg-blue-100 text-blue-600">{p.status}</span>
                                                </td>
                                                <td className="p-4 font-mono text-[10px] text-blue-600 font-black">{p.icd10 || '-'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </main>

                {selectedPatient && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                        <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onClick={() => setSelectedPatient(null)} />
                        <div className="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl relative overflow-hidden animate-in zoom-in-95">
                            <div className="p-8 space-y-6">
                                <div className="flex justify-between items-start">
                                    <div><p className="font-black text-2xl uppercase">{selectedPatient.namaPasien}</p><p className="text-xs font-bold text-slate-400">{selectedPatient.umur} • {selectedPatient.status}</p></div>
                                    <button onClick={() => setSelectedPatient(null)} className="p-2 bg-slate-100 rounded-full"><Icon name="X" className="w-5 h-5" /></button>
                                </div>
                                <div className="bg-blue-50 p-6 rounded-3xl border border-blue-100">
                                    <p className="text-[10px] font-black text-blue-600 uppercase mb-1">Diagnosa & ICD</p>
                                    <p className="font-black text-lg text-blue-900 leading-tight uppercase">{selectedPatient.diagnosis} ({selectedPatient.icd10})</p>
                                </div>
                                <div className="space-y-1">
                                    <p className="text-[9px] font-black text-slate-400 uppercase">Keluhan / Anamnesa:</p>
                                    <p className="text-sm italic text-slate-600 leading-relaxed border-l-4 border-blue-200 pl-3">"{selectedPatient.anamnesa || '-'}"</p>
                                </div>
                                <div className="flex gap-2 pt-4">
                                    <button onClick={() => setShowDeleteConfirm(true)} className="flex-1 py-4 bg-red-50 text-red-600 rounded-2xl font-black text-xs uppercase">Hapus</button>
                                    <button onClick={() => { setActiveTab('register'); setFormData(selectedPatient); setSelectedPatient(null); }} className="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase shadow-lg">Edit</button>
                                </div>
                            </div>
                        </div>
                    </div>
                )}

                {showDeleteConfirm && (
                    <div className="fixed inset-0 z-[60] flex items-center justify-center p-6 bg-red-900/60 backdrop-blur-md">
                        <div className="bg-white w-full max-w-xs rounded-[2.5rem] p-8 text-center shadow-2xl">
                            <h3 className="text-xl font-black mb-2 uppercase">Hapus Data?</h3>
                            <p className="text-xs text-slate-500 mb-6 font-bold uppercase tracking-widest leading-relaxed">Tindakan ini tidak dapat dibatalkan.</p>
                            <button onClick={confirmDelete} className="w-full py-4 bg-red-600 text-white font-black rounded-2xl text-xs uppercase mb-2">YA, HAPUS</button>
                            <button onClick={() => setShowDeleteConfirm(false)} className="w-full py-2 text-slate-400 font-bold text-xs uppercase">BATAL</button>
                        </div>
                    </div>
                )}

                <nav className="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t p-4 flex justify-around items-center z-40 no-print rounded-t-[2.5rem] shadow-2xl">
                    {[
                        { id: 'dashboard', icon: 'LayoutDashboard', label: 'Home' },
                        { id: 'register', icon: 'UserPlus', label: 'Input' },
                        { id: 'history', icon: 'ClipboardList', label: 'Register' }
                    ].map(t => (
                        <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex flex-col items-center gap-1 ${activeTab === t.id ? 'text-blue-600' : 'text-slate-400'}`}>
                            <div className={`p-3 rounded-2xl ${activeTab === t.id ? 'bg-blue-600 text-white shadow-lg' : ''}`}><Icon name={t.icon} className="w-5 h-5" /></div>
                            <span className="text-[8px] font-black uppercase tracking-widest">{t.label}</span>
                        </button>
                    ))}
                </nav>

                <div id="print-area" className="p-10 font-serif">
                    <div className="text-center border-b-4 border-double pb-4 mb-8">
                        <h1 className="text-2xl font-bold uppercase">Laporan Rekapitulasi Pasien</h1>
                        <h2 className="text-lg uppercase">Periode: {filterMonth}</h2>
                    </div>
                    <div className="grid grid-cols-2 gap-8 mb-10">
                        <div className="border p-4 rounded-xl">
                            <h3 className="font-bold border-b mb-2 uppercase">Statistik Kunjungan</h3>
                            <p>Total Pasien: {dashboardData.total}</p>
                            <p>Umum: {dashboardData.statusCounts['Umum'] || 0}</p>
                            <p>BPJS: {dashboardData.statusCounts['BPJS'] || 0}</p>
                        </div>
                        <div className="border p-4 rounded-xl">
                            <h3 className="font-bold border-b mb-2 uppercase">Top 5 Penyakit (ICD-10)</h3>
                            {dashboardData.topIcd.map(([code, count]) => (
                                <p key={code}>{code}: {count} Kasus</p>
                            ))}
                        </div>
                    </div>
                    <div className="mt-20 flex justify-end"><div className="text-center w-64 border-t border-black pt-2 font-bold uppercase">Petugas Pemeriksa</div></div>
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
